# ==============================================================================
# 1. AUTH SERVICE
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: desafio2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      initContainers:
        - name: init-db-and-tables
          image: postgres:15-alpine
          env:
            - name: PGUSER
              valueFrom:
                secretKeyRef: { name: app-secrets, key: DB_AUTH_USER }
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef: { name: app-secrets, key: DB_AUTH_PASSWORD }
            - name: PGHOST
              valueFrom:
                configMapKeyRef: { name: app-configmap, key: DB_AUTH_HOST }
            - name: PGPORT
              valueFrom:
                configMapKeyRef: { name: app-configmap, key: DB_PORT }
            - name: TARGET_DB_NAME
              valueFrom:
                configMapKeyRef: { name: app-configmap, key: DB_AUTH_NAME }
          command:
            - sh
            - -c
            - |
              psql -d postgres -c "CREATE DATABASE ${TARGET_DB_NAME};" 2>/dev/null || true
              psql -d ${TARGET_DB_NAME} -c "CREATE TABLE IF NOT EXISTS api_keys (id SERIAL PRIMARY KEY, name VARCHAR(100) NOT NULL, key_hash VARCHAR(64) NOT NULL UNIQUE, is_active BOOLEAN DEFAULT true, created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP);"
      containers:
        - name: auth-service
          image: 297922603388.dkr.ecr.us-east-1.amazonaws.com/auth-service:latest
          ports:
            - containerPort: 8001
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: app-secrets, key: DB_AUTH_USER }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: app-secrets, key: DB_AUTH_PASSWORD }
            - name: DB_HOST
              valueFrom:
                configMapKeyRef: { name: app-configmap, key: DB_AUTH_HOST }
            - name: DB_PORT
              valueFrom:
                configMapKeyRef: { name: app-configmap, key: DB_PORT }
            - name: DB_NAME
              valueFrom:
                configMapKeyRef: { name: app-configmap, key: DB_AUTH_NAME }
            - name: SERVICE_API_KEY
              valueFrom:
                secretKeyRef: { name: app-secrets, key: SERVICE_API_KEY }
            - name: MASTER_KEY
              valueFrom:
                secretKeyRef: { name: app-secrets, key: SERVICE_API_KEY }
            - name: APP_PORT
              value: "8001"
            - name: DATABASE_URL
              value: "postgres://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
          resources:
            requests: { memory: "128Mi", cpu: "100m" }
            limits: { memory: "256Mi", cpu: "300m" }
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service-svc
  namespace: desafio2
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8001
  selector:
    app: auth-service

---
# ==============================================================================
# 2. FLAG SERVICE
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flag-service
  namespace: desafio2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flag-service
  template:
    metadata:
      labels:
        app: flag-service
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      initContainers:
        - name: init-flag-db-and-tables
          image: postgres:15-alpine
          env:
            - name: PGUSER
              valueFrom:
                secretKeyRef: { name: app-secrets, key: DB_FLAG_USER }
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef: { name: app-secrets, key: DB_FLAG_PASSWORD }
            - name: PGHOST
              valueFrom:
                configMapKeyRef: { name: app-configmap, key: DB_FLAG_HOST }
            - name: PGPORT
              valueFrom:
                configMapKeyRef: { name: app-configmap, key: DB_PORT }
            - name: TARGET_DB_NAME
              valueFrom:
                configMapKeyRef: { name: app-configmap, key: DB_FLAG_NAME }
          command:
            - sh
            - -c
            - |
              psql -d postgres -c "CREATE DATABASE ${TARGET_DB_NAME};" 2>/dev/null || true
              psql -d ${TARGET_DB_NAME} -c "
                CREATE TABLE IF NOT EXISTS flags (
                    id SERIAL PRIMARY KEY,
                    name VARCHAR(100) UNIQUE NOT NULL, 
                    description TEXT,
                    is_enabled BOOLEAN NOT NULL DEFAULT false,
                    created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
                    updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
                );
                CREATE OR REPLACE FUNCTION trigger_set_timestamp()
                RETURNS TRIGGER AS \$\$
                BEGIN
                    NEW.updated_at = NOW();
                    RETURN NEW;
                END;
                \$\$ LANGUAGE plpgsql;
                DROP TRIGGER IF EXISTS set_timestamp ON flags;
                CREATE TRIGGER set_timestamp
                BEFORE UPDATE ON flags
                FOR EACH ROW
                EXECUTE PROCEDURE trigger_set_timestamp();
              "
      containers:
        - name: flag-service
          image: 297922603388.dkr.ecr.us-east-1.amazonaws.com/flag-service:latest
          ports:
            - containerPort: 8002
          env:
            - name: GUNICORN_CMD_ARGS
              value: "--bind=0.0.0.0:8002"
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: app-secrets, key: DB_FLAG_USER }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: app-secrets, key: DB_FLAG_PASSWORD }
            - name: DB_HOST
              valueFrom:
                configMapKeyRef: { name: app-configmap, key: DB_FLAG_HOST }
            - name: DB_PORT
              valueFrom:
                configMapKeyRef: { name: app-configmap, key: DB_PORT }
            - name: DB_NAME
              valueFrom:
                configMapKeyRef: { name: app-configmap, key: DB_FLAG_NAME }
            - name: PORT
              value: "8002"
            - name: DATABASE_URL
              value: "postgres://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef: { name: app-configmap, key: AUTH_SERVICE_URL }
            - name: SERVICE_API_KEY
              valueFrom:
                secretKeyRef: { name: app-secrets, key: SERVICE_API_KEY }
          resources:
            requests: { memory: "128Mi", cpu: "100m" }
            limits: { memory: "256Mi", cpu: "300m" }
---
apiVersion: v1
kind: Service
metadata:
  name: flag-service-svc
  namespace: desafio2
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: flag-service

---
# ==============================================================================
# 3. TARGETING SERVICE (CORRIGIDO)
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: targeting-service
  namespace: desafio2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: targeting-service
  template:
    metadata:
      labels:
        app: targeting-service
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      initContainers:
        - name: init-targeting-db-and-tables
          image: postgres:15-alpine
          env:
            - name: PGUSER
              valueFrom:
                secretKeyRef: { name: app-secrets, key: DB_TARGET_USER }
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef: { name: app-secrets, key: DB_TARGET_PASSWORD }
            - name: PGHOST
              valueFrom:
                configMapKeyRef: { name: app-configmap, key: DB_TARGET_HOST }
            - name: PGPORT
              valueFrom:
                configMapKeyRef: { name: app-configmap, key: DB_PORT }
            - name: TARGET_DB_NAME
              valueFrom:
                configMapKeyRef: { name: app-configmap, key: DB_TARGET_NAME }
          command:
            - sh
            - -c
            - |
              psql -d postgres -c "CREATE DATABASE ${TARGET_DB_NAME};" 2>/dev/null || true
              psql -d ${TARGET_DB_NAME} -c "
                CREATE TABLE IF NOT EXISTS targeting_rules (
                    id SERIAL PRIMARY KEY,
                    flag_name VARCHAR(100) UNIQUE NOT NULL,
                    is_enabled BOOLEAN NOT NULL DEFAULT true,
                    rules JSONB NOT NULL,
                    created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
                    updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
                );

                CREATE OR REPLACE FUNCTION trigger_set_timestamp()
                RETURNS TRIGGER AS \$\$
                BEGIN
                    NEW.updated_at = NOW();
                    RETURN NEW;
                END;
                \$\$ LANGUAGE plpgsql;

                DROP TRIGGER IF EXISTS set_timestamp ON targeting_rules;

                CREATE TRIGGER set_timestamp
                BEFORE UPDATE ON targeting_rules
                FOR EACH ROW
                EXECUTE PROCEDURE trigger_set_timestamp();
              "
      containers:
        - name: targeting-service
          image: 297922603388.dkr.ecr.us-east-1.amazonaws.com/targeting-service:latest
          ports:
            - containerPort: 8003
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef: { name: app-secrets, key: DB_TARGET_USER }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: app-secrets, key: DB_TARGET_PASSWORD }
            - name: DB_HOST
              valueFrom:
                configMapKeyRef: { name: app-configmap, key: DB_TARGET_HOST }
            - name: DB_PORT
              valueFrom:
                configMapKeyRef: { name: app-configmap, key: DB_PORT }
            - name: DB_NAME
              valueFrom:
                configMapKeyRef: { name: app-configmap, key: DB_TARGET_NAME }
            - name: FLAG_SERVICE_URL
              valueFrom:
                configMapKeyRef: { name: app-configmap, key: FLAG_SERVICE_URL }
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef: { name: app-configmap, key: AUTH_SERVICE_URL }
            - name: SERVICE_API_KEY
              valueFrom:
                secretKeyRef: { name: app-secrets, key: SERVICE_API_KEY }
            - name: PORT
              value: "8003"
            - name: DATABASE_URL
              value: "postgres://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
          resources:
            requests: { memory: "128Mi", cpu: "100m" }
            limits: { memory: "256Mi", cpu: "300m" }
---
apiVersion: v1
kind: Service
metadata:
  name: targeting-service-svc
  namespace: desafio2
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: targeting-service

